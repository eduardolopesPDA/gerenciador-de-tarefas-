<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <script src="src/app.js"></script>
    <title>Gerenciador de tarefas kanban</title>
</head>
<body>
   <header>
        <h1>GERENCIADOR DE TAREFAS</h1>
        <div class="header-buttons">
            <button onclick="showTutorial()">tutorial</button>
            <button id="theme-toggle" onclick="toggleTheme()">DARK</button>
        </div>
    </header>

    <main class="kanban-board">
        <div class="column" id="col-todo">
            <div class="column-header">
                <h2>A fazer</h2>
                <button class="btn-config" onclick="configColumn('todo-list')">Configs</button>
            </div>
            <div class="task-list" id="todo-list"></div>
            <button class="btn-add" onclick="createTask('todo-list')">Criar tarefa</button>
        </div>

        <div class="column" id="col-progress">
            <div class="column-header">
                <h2>Em progresso</h2>
                <button class="btn-config" onclick="configColumn('progress-list')">Configs</button>
            </div>
            <div class="task-list" id="progress-list"></div>
            <button class="btn-add" onclick="createTask('progress-list')">Criar tarefa</button>
        </div>

        <div class="column" id="col-done">
            <div class="column-header">
                <h2>Finalizado</h2>
                <button class="btn-config" onclick="configColumn('done-list')">Configs</button>
            </div>
            <div class="task-list" id="done-list"></div>
            <button class="btn-add" onclick="createTask('done-list')">Criar tarefa</button>
        </div>
    </main>

    <div class="action-footer">
        <button onclick="saveBoard()">Salvar</button>
        <button onclick="deleteAllTasks()">Deletar</button>
    </div>
</body>
</html>
